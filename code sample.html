<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #f472b6;
      --primary-hover: #ec4899;
      --primary-light: #fbcfe8;
      --secondary: #22d3ee;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --bg-hover: #1c1c22;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --success: #34d399;
      --danger: #f87171;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }

    /* Animated background pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 20% 30%, rgba(244, 114, 182, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      width: 100%;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 0.8s ease-out, glow 3s ease-in-out infinite 0.8s;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glow {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 8px rgba(244, 114, 182, 0.5));
      }
      50% {
        filter: brightness(1.15) drop-shadow(0 0 20px rgba(244, 114, 182, 0.8));
      }
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(244, 114, 182, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
    }

    .subtitle {
      color: var(--text-muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .stat-card {
      flex: 1;
      min-width: 180px;
      max-width: 280px;
      background: var(--bg-card);
      padding: 1.5rem 1.75rem;
      border-radius: 20px;
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.4);
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out both;
    }

    .stat-card:nth-child(1) { animation-delay: 0.2s; }
    .stat-card:nth-child(2) { animation-delay: 0.35s; }
    .stat-card:nth-child(3) { animation-delay: 0.5s; }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-4px) translateX(2px) scale(1.02);
      border-color: rgba(244, 114, 182, 0.3);
      box-shadow: 0 12px 40px -8px rgba(244, 114, 182, 0.25);
      animation: pulse-ring 1s ease-out;
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-value {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .add-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .add-form input {
      flex: 1;
      padding: 1rem 1.5rem;
      border: 2px solid var(--border);
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      background: var(--bg-card);
      color: var(--text);
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .add-form input::placeholder {
      color: var(--text-muted);
    }

    .add-form input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.15), 0 4px 20px -4px rgba(0, 0, 0, 0.3), 0 0 20px rgba(244, 114, 182, 0.2);
    }

    .add-form button {
      padding: 1rem 2rem;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out 0.6s both, bounce 2s ease-in-out infinite 2s;
    }

    .add-form button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }

    .add-form button:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 30px -4px rgba(244, 114, 182, 0.5), 0 0 30px rgba(244, 114, 182, 0.3);
    }

    .add-form button:hover::before {
      left: 100%;
    }

    .add-form button:active {
      transform: scale(0.95);
    }

    .tasks-list {
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: 1px solid var(--border);
      animation: fadeInUp 0.8s ease-out 0.5s both, glow 4s ease-in-out infinite 1.5s;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    .task:last-child {
      border-bottom: none;
    }

    .task:hover {
      background: var(--bg-hover);
      transform: translateX(4px);
    }

    .task.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .task-checkbox:hover {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(244, 114, 182, 0.4);
      transform: scale(1.1);
    }

    .task.completed .task-checkbox {
      background: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.5);
    }

    .task-checkbox::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
      display: none;
    }

    .task.completed .task-checkbox::after {
      display: block;
      animation: pop 0.3s ease-out;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .task-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 8px;
      font-size: 1.25rem;
      transition: all 0.2s;
      opacity: 0.6;
    }

    .task-delete:hover {
      color: var(--danger);
      background: rgba(248, 113, 113, 0.15);
      opacity: 1;
      transform: scale(1.2) rotate(10deg);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 2s ease-in-out infinite;
    }

    .filter-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      justify-content: center;
    }

    .filter-btn {
      padding: 0.625rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--text-muted);
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2);
    }

    .filter-btn.active {
      background: var(--gradient);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4);
    }

    /* Responsive: All screens */
    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .stats {
        flex-direction: column;
      }

      .stat-card {
        flex-direction: row;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        min-width: 100%;
        max-width: 100%;
      }

      .stat-value {
        font-size: 1.25rem;
      }

      .add-form {
        flex-direction: column;
      }

      .add-form button {
        width: 100%;
      }

      .filter-buttons {
        justify-content: stretch;
      }

      .filter-btn {
        flex: 1;
      }

      .task {
        padding: 0.875rem;
      }

      .task-text {
        font-size: 0.9rem;
        word-break: break-word;
      }
    }

    /* Tablet */
    @media (min-width: 481px) and (max-width: 768px) {
      .container {
        max-width: 90%;
      }

      .stats {
        flex-wrap: wrap;
      }

      .stat-card {
        flex: 1 1 calc(33.333% - 0.5rem);
        min-width: 120px;
      }

      .stat-value {
        font-size: 1.5rem;
      }
    }

    /* Large screens */
    @media (min-width: 1200px) {
      .container {
        max-width: 1000px;
      }

      .stat-card {
        padding: 1.5rem 2rem;
      }

      .stat-value {
        font-size: 2.5rem;
      }

      .stat-label {
        font-size: 1rem;
      }

      h1 {
        font-size: 2.5rem;
      }

      .subtitle {
        font-size: 1.1rem;
      }

      .add-form input {
        padding: 1rem 1.25rem;
        font-size: 1.1rem;
      }

      .add-form button {
        padding: 1rem 2rem;
        font-size: 1.1rem;
      }

      .task {
        padding: 1.25rem;
      }

      .task-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Task Manager</h1>
      <p class="subtitle">Stay organized, get things done</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="total-count">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="completed-count">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pending-count">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>

    <form class="add-form" id="add-form">
      <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off">
      <button type="submit">Add Task</button>
    </form>

    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div class="tasks-list" id="tasks-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">📝</div>
        <p>No tasks yet. Add one above!</p>
      </div>
    </div>
  </div>

  <script>
    // State
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let currentFilter = 'all';

    // DOM Elements
    const addForm = document.getElementById('add-form');
    const taskInput = document.getElementById('task-input');
    const tasksList = document.getElementById('tasks-list');
    const emptyState = document.getElementById('empty-state');
    const totalCount = document.getElementById('total-count');
    const completedCount = document.getElementById('completed-count');
    const pendingCount = document.getElementById('pending-count');
    const filterButtons = document.querySelectorAll('.filter-btn');

    // Save to localStorage
    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    // Update stats
    function updateStats() {
      const completed = tasks.filter(t => t.completed).length;
      totalCount.textContent = tasks.length;
      completedCount.textContent = completed;
      pendingCount.textContent = tasks.length - completed;
    }

    // Render tasks
    function renderTasks() {
      const filteredTasks = tasks.filter(task => {
        if (currentFilter === 'pending') return !task.completed;
        if (currentFilter === 'completed') return task.completed;
        return true;
      });

      // Clear existing tasks
      const existingTasks = tasksList.querySelectorAll('.task');
      existingTasks.forEach(task => task.remove());

      if (filteredTasks.length === 0) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        
        filteredTasks.forEach((task, index) => {
          const allTasks = tasks.filter(t => {
            if (currentFilter === 'pending') return !t.completed;
            if (currentFilter === 'completed') return t.completed;
            return true;
          });
          const actualIndex = tasks.indexOf(task);
          
          const taskEl = document.createElement('div');
          taskEl.className = `task ${task.completed ? 'completed' : ''}`;
          taskEl.innerHTML = `
            <div class="task-checkbox" data-index="${actualIndex}"></div>
            <span class="task-text">${escapeHtml(task.text)}</span>
            <button class="task-delete" data-index="${actualIndex}">×</button>
          `;
          tasksList.appendChild(taskEl);
        });
      }

      updateStats();
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Add task
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = taskInput.value.trim();
      if (!text) return;

      tasks.push({ text, completed: false });
      taskInput.value = '';
      saveTasks();
      renderTasks();
    });

    // Toggle task completion
    tasksList.addEventListener('click', (e) => {
      if (e.target.classList.contains('task-checkbox')) {
        const index = parseInt(e.target.dataset.index);
        tasks[index].completed = !tasks[index].completed;
        saveTasks();
        renderTasks();
      }
      
      if (e.target.classList.contains('task-delete')) {
        const index = parseInt(e.target.dataset.index);
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
      }
    });

    // Filter buttons
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    // Initialize
    renderTasks();
  </script>
</body>
</html>
