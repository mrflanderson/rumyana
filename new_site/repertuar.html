<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Репертуар — РУМЯНА BAND</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f472b6;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }
    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      padding-bottom: 100px;
      overflow-y: auto;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab {
      padding: 0.75rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    .tab:hover, .tab.active {
      background: var(--gradient);
      color: white;
      border-color: transparent;
    }
    .song-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      max-height: 60vh;
      overflow-y: auto;
    }
    .song {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .song-num {
      width: 28px;
      height: 28px;
      background: var(--gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .song-name {
      font-size: 1rem;
    }
    .song-artist {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 22, 26, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0.5rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.5rem;
      min-width: 60px;
    }
    .nav-item:hover, .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 1.25rem; }
    @media (max-width: 480px) {
      .app-screen { padding: 1rem; padding-bottom: 100px; }
      .nav-bar { padding: 0.5rem 0.25rem; }
      .nav-item { font-size: 0.6rem; min-width: 50px; }
      .song { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="app-screen">
    <h1>Репертуар</h1>
    <p class="tagline">500+ хитов</p>
    
    <div class="tabs">
      <button class="tab active" onclick="filterSongs('all')">Все</button>
      <button class="tab" onclick="filterSongs('dance')">Танцевальные</button>
      <button class="tab" onclick="filterSongs('rock')">Рок</button>
      <button class="tab" onclick="filterSongs('pop')">Поп</button>
    </div>

    <div class="song-list" id="song-list">
      <div class="song"><div class="song-num">1</div><div><div class="song-name">Виновата</div><div class="song-artist">Artik & Asti</div></div></div>
      <div class="song"><div class="song-num">2</div><div><div class="song-name">Моя территория</div><div class="song-artist">Глюк'oZа</div></div></div>
      <div class="song"><div class="song-num">3</div><div><div class="song-name">Карамель</div><div class="song-artist">H2O</div></div></div>
      <div class="song"><div class="song-num">4</div><div><div class="song-name">Корни</div><div class="song-artist">Корни</div></div></div>
      <div class="song"><div class="song-num">5</div><div><div class="song-name">Натали</div><div class="song-artist">Потап и Настя</div></div></div>
      <div class="song"><div class="song-num">6</div><div><div class="song-name">Чито-моё</div><div class="song-artist">KREC</div></div></div>
      <div class="song"><div class="song-num">7</div><div><div class="song-name">Люсьен</div><div class="song-artist">Фабрика</div></div></div>
      <div class="song"><div class="song-num">8</div><div><div class="song-name">Невеста</div><div class="song-artist">МакSим</div></div></div>
      <div class="song"><div class="song-num">9</div><div><div class="song-name">Три полоски</div><div class="song-artist">Серебро</div></div></div>
      <div class="song"><div class="song-num">10</div><div><div class="song-name">Believe</div><div class="song-artist">Armin van Buuren</div></div></div>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.htm" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="video.html" class="nav-item">
      <span class="nav-icon">🎬</span>
      <span>Видео</span>
    </a>
    <a href="fotogalereya.html" class="nav-item">
      <span class="nav-icon">📷</span>
      <span>Фото</span>
    </a>
    <a href="repertuar.html" class="nav-item active">
      <span class="nav-icon">🎵</span>
      <span>Репертуар</span>
    </a>
    <a href="kontakty.html" class="nav-item">
      <span class="nav-icon">📞</span>
      <span>Контакты</span>
    </a>
  </nav>

  <script>
    function filterSongs(genre) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
