<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>РУМЯНА BAND — Кавер-группа в Москве</title>
  <meta name="description" content="Кавер-группа РУМЯНА BAND — живая музыка 4–8 артистов на свадьбу, корпоратив и юбилей. От 30 000 ₽">
  <meta property="og:title" content="РУМЯНА BAND ✨ Кавер-группа в Москве">
  <meta property="og:description" content="Живая музыка 4–8 артистов на ваше мероприятие. Румяньтесь с нами!">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f472b6;
      --primary-hover: #ec4899;
      --primary-light: #fbcfe8;
      --secondary: #22d3ee;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --bg-hover: #1c1c22;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --success: #34d399;
      --danger: #f87171;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }

    /* Full screen container */
    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Background video */
    .hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 12, 15, 0.75);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 100%;
      max-width: 800px;
    }

    /* Logo / Brand */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .brand-name {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* Main title */
    h1 {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
      animation: fadeInUp 0.8s ease-out 0.1s both, glow 3s ease-in-out infinite 0.8s;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    /* Stats cards */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      max-width: 200px;
      background: rgba(22, 22, 26, 0.8);
      backdrop-filter: blur(10px);
      padding: 1.25rem 1.5rem;
      border-radius: 20px;
      border: 1px solid rgba(39, 39, 42, 0.8);
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 20px 20px 0 0;
    }

    .stat-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(244, 114, 182, 0.3);
      box-shadow: 0 12px 40px -8px rgba(244, 114, 182, 0.25);
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-value {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* CTA Buttons */
    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .btn {
      padding: 1rem 2rem;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-gradient {
      background: var(--gradient);
      color: white;
      border: none;
      box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4);
    }

    .btn-gradient:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 30px -4px rgba(244, 114, 182, 0.5);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(244, 114, 182, 0.2);
    }

    /* Navigation bar */
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 22, 26, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0.5rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      z-index: 100;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      transition: all 0.3s;
      padding: 0.5rem;
      min-width: 60px;
    }

    .nav-item:hover, .nav-item.active {
      color: var(--primary);
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    /* Format cards section */
    .formats {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      padding: 0 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .format-card {
      background: rgba(22, 22, 26, 0.85);
      backdrop-filter: blur(10px);
      padding: 0.75rem 1.25rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .format-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 8px 30px rgba(244, 114, 182, 0.2);
    }

    .format-icon {
      font-size: 1.1rem;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glow {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 8px rgba(244, 114, 182, 0.5));
      }
      50% {
        filter: brightness(1.15) drop-shadow(0 0 20px rgba(244, 114, 182, 0.8));
      }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(244, 114, 182, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app-screen {
        padding: 1rem;
        padding-bottom: 100px;
      }

      .stats {
        gap: 0.5rem;
      }

      .stat-card {
        padding: 1rem;
        min-width: 90px;
      }

      .cta-buttons {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .formats {
        bottom: 90px;
        gap: 0.5rem;
      }

      .format-card {
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
      }

      .nav-bar {
        padding: 0.5rem 0.25rem;
      }

      .nav-item {
        font-size: 0.6rem;
        min-width: 50px;
        padding: 0.4rem;
      }

      .nav-icon {
        font-size: 1.1rem;
      }
    }

    @media (min-width: 1200px) {
      .content {
        max-width: 900px;
      }

      .stat-card {
        padding: 1.5rem 2rem;
      }

      h1 {
        font-size: 4rem;
      }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal.show { display: flex; }

    .modal-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 400px;
      width: 100%;
      position: relative;
      border: 1px solid var(--border);
    }

    .modal-close {
      position: absolute;
      top: 0.5rem;
      right: 0.75rem;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-close:hover { color: var(--text); }

    #formatInfo h2 {
      color: var(--primary);
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    #formatInfo p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .format-card { cursor: pointer; }
  </style>
</head>
<body>
  <div class="app-screen">
    <!-- Hero Video -->
    <video class="hero-video" autoplay muted loop playsinline preload="metadata">
      <source src="f/cover_v6_hero.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <!-- Main Content -->
    <div class="content">
      <!-- Brand -->
      <div class="brand">
        <img src="d/bayan_logo.png" alt="Логотип" class="brand-logo">
        <span class="brand-name">РУМЯНА BAND</span>
      </div>

      <!-- Title -->
      <h1>Кавер-группа</h1>
      <p class="tagline">Живая музыка 4–8 артистов на ваше мероприятие</p>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value">500+</div>
          <div class="stat-label">Хитов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">12+</div>
          <div class="stat-label">Лет</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">30к₽</div>
          <div class="stat-label">От</div>
        </div>
      </div>

      <!-- CTA Buttons -->
      <div class="cta-buttons">
        <a href="kontakty.html" class="btn btn-gradient">Заказать</a>
        <a href="video.html" class="btn btn-outline">Смотреть шоурил</a>
      </div>
    </div>

    <!-- Formats (clickable cards) -->
    <div class="formats">
      <div class="format-card" onclick="showFormat('cover')">
        <span class="format-icon">🎤</span>
        <span>Кавер-группа</span>
      </div>
      <div class="format-card" onclick="showFormat('folk')">
        <span class="format-icon">🎻</span>
        <span>Фолк</span>
      </div>
      <div class="format-card" onclick="showFormat('rusalki')">
        <span class="format-icon">🧜‍♀️</span>
        <span>Русалки</span>
      </div>
    </div>

    <!-- Format Info Modal -->
    <div id="formatModal" class="modal" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="formatInfo"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <a href="index.htm" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="video.html" class="nav-item">
      <span class="nav-icon">🎬</span>
      <span>Видео</span>
    </a>
    <a href="fotogalereya.html" class="nav-item">
      <span class="nav-icon">📷</span>
      <span>Фото</span>
    </a>
    <a href="repertuar.html" class="nav-item">
      <span class="nav-icon">🎵</span>
      <span>Репертуар</span>
    </a>
    <a href="kontakty.html" class="nav-item">
      <span class="nav-icon">📞</span>
      <span>Контакты</span>
    </a>
  </nav>
  <script>
    const formats = {
      cover: {
        title: 'Кавер-группа',
        desc: 'Живая музыка 4-8 артистов на вашем празднике. Поем хиты 90-х, 2000-х, современные треки. Танцевальная программа весь вечер! От 50 000 ₽'
      },
      folk: {
        title: 'Фолк',
        desc: 'Русская народная музыка с баяном и гармонью. Песни под гитару, частушки, застольные песни. Душевно и весело! От 40 000 ₽'
      },
      rusalki: {
        title: 'Русалки',
        desc: 'Девичник с живой музыкой! Поем хиты, танцуем, играем. На воде и на суше - везде весело. От 35 000 ₽'
      }
    };

    function showFormat(type) {
      const f = formats[type];
      document.getElementById('formatInfo').innerHTML = '<h2>' + f.title + '</h2><p>' + f.desc + '</p>';
      document.getElementById('formatModal').classList.add('show');
    }

    function closeModal(e) {
      if (!e || e.target.classList.contains('modal')) {
        document.getElementById('formatModal').classList.remove('show');
      }
    }
  </script>
</body>
</html>
