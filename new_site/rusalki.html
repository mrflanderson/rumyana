<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Русалки — РУМЯНА BAND</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f472b6;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }
    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      padding-bottom: 100px;
      overflow-y: auto;
    }
    .content { text-align: center; max-width: 600px; }
    h1 {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(22, 22, 26, 0.8);
      border-radius: 16px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .feature-text h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .feature-text p { font-size: 0.85rem; color: var(--text-muted); }
    .price {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .price span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      padding: 1rem 2rem;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      background: var(--gradient);
      color: white;
      transition: all 0.3s;
      display: inline-block;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(244, 114, 182, 0.5);
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 22, 26, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0.5rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.5rem;
      min-width: 60px;
    }
    .nav-item:hover, .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 1.25rem; }
    @media (max-width: 480px) {
      .app-screen { padding: 1rem; padding-bottom: 100px; }
      .nav-bar { padding: 0.5rem 0.25rem; }
      .nav-item { font-size: 0.6rem; min-width: 50px; }
    }
  </style>
</head>
<body>
  <div class="app-screen">
    <div class="content">
      <h1>🧜‍♀️ Русалки</h1>
      <p class="tagline">Камерный женский вокал</p>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">👸</div>
          <div class="feature-text">
            <h3>3–4 вокалистки</h3>
            <p>Элегантные образы</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎭</div>
          <div class="feature-text">
            <h3>Актёрские номера</h3>
            <p>Мини-спектакли</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">🕯️</div>
          <div class="feature-text">
            <h3>Атмосфера</h3>
            <p>Волшебное настроение</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">💐</div>
          <div class="feature-text">
            <h3>Для романтики</h3>
            <p>Идеально для ужинов</p>
          </div>
        </div>
      </div>

      <div class="price">От <span>25 000 ₽</span></div>

      <a href="kontakty.html" class="btn">Заказать</a>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.htm" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="video.html" class="nav-item">
      <span class="nav-icon">🎬</span>
      <span>Видео</span>
    </a>
    <a href="fotogalereya.html" class="nav-item">
      <span class="nav-icon">📷</span>
      <span>Фото</span>
    </a>
    <a href="repertuar.html" class="nav-item">
      <span class="nav-icon">🎵</span>
      <span>Репертуар</span>
    </a>
    <a href="kontakty.html" class="nav-item active">
      <span class="nav-icon">📞</span>
      <span>Контакты</span>
    </a>
  </nav>
</body>
</html>
