<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Фото — РУМЯНА BAND</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f472b6;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }
    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      padding-bottom: 100px;
      overflow-y: auto;
    }
    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .tagline {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }
    .photo-card {
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--bg-card);
    }
    .photo-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(244, 114, 182, 0.3);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 22, 26, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0.5rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      transition: all 0.3s;
      padding: 0.5rem;
      min-width: 60px;
    }
    .nav-item:hover, .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 1.25rem; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 480px) {
      .app-screen { padding: 1rem; padding-bottom: 100px; }
      .nav-bar { padding: 0.5rem 0.25rem; }
      .nav-item { font-size: 0.6rem; min-width: 50px; }
    }
  </style>
</head>
<body>
  <div class="app-screen">
    <h1>Фото</h1>
    <p class="tagline">Выступления и мероприятия</p>
    <div class="photo-grid">
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 1"></div>
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 2"></div>
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 3"></div>
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 4"></div>
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 5"></div>
      <div class="photo-card" onclick="viewPhoto(this)"><img src="d/anime_all.png" alt="Фото 6"></div>
    </div>
  </div>
  <nav class="nav-bar">
    <a href="index.htm" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="video.html" class="nav-item">
      <span class="nav-icon">🎬</span>
      <span>Видео</span>
    </a>
    <a href="fotogalereya.html" class="nav-item active">
      <span class="nav-icon">📷</span>
      <span>Фото</span>
    </a>
    <a href="repertuar.html" class="nav-item">
      <span class="nav-icon">🎵</span>
      <span>Репертуар</span>
    </a>
    <a href="kontakty.html" class="nav-item">
      <span class="nav-icon">📞</span>
      <span>Контакты</span>
    </a>
  </nav>
  <script>
    function viewPhoto(el) {
      const img = el.querySelector('img');
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;';
      modal.innerHTML = `<img src="${img.src}" style="max-width:95%;max-height:95%;border-radius:10px;"><div onclick="this.parentElement.remove()" style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);color:white;padding:10px 20px;border-radius:10px;cursor:pointer;">✕</div>`;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
