<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Видео — РУМЯНА BAND</title>
  <meta name="description" content="Видео выступлений кавер-группы РУМЯНА BAND. Свадьбы, корпоративы, юбилеи.">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f472b6;
      --primary-hover: #ec4899;
      --primary-light: #fbcfe8;
      --secondary: #22d3ee;
      --bg-dark: #0c0c0f;
      --bg-card: #16161a;
      --bg-hover: #1c1c22;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --success: #34d399;
      --danger: #f87171;
      --gradient: linear-gradient(135deg, #f472b6 0%, #22d3ee 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(244, 114, 182, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
    }

    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      padding-bottom: 100px;
      overflow-y: auto;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.5rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .tagline {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .video-card {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .video-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 12px 40px -8px rgba(244, 114, 182, 0.25);
    }

    .video-wrapper {
      position: relative;
      padding-top: 56.25%;
      background: #000;
    }

    .video-wrapper video,
    .video-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(244, 114, 182, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s;
    }

    .video-card:hover .play-btn {
      transform: translate(-50%, -50%) scale(1.1);
      background: var(--primary);
    }

    .video-info {
      padding: 1rem;
    }

    .video-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .video-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 22, 26, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0.5rem;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      transition: all 0.3s;
      padding: 0.5rem;
      min-width: 60px;
    }

    .nav-item:hover, .nav-item.active {
      color: var(--primary);
    }

    .nav-icon {
      font-size: 1.25rem;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 480px) {
      .app-screen {
        padding: 1rem;
        padding-bottom: 100px;
      }
      .video-grid {
        grid-template-columns: 1fr;
      }
      .nav-bar {
        padding: 0.5rem 0.25rem;
      }
      .nav-item {
        font-size: 0.6rem;
        min-width: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="app-screen">
    <h1>Видео</h1>
    <p class="tagline">Выступления и шоу-программы</p>

    <div class="video-grid">
      <div class="video-card" onclick="playVideo('f/v7.mp4', 'Шоурил')">
        <div class="video-wrapper">
          <img src="d/reel_postr.jpg" alt="Шоурил">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-info">
          <div class="video-title">Шоурил</div>
          <div class="video-desc">Лучшие моменты</div>
        </div>
      </div>

      <div class="video-card" onclick="playVideo('f/rumyana_na_korp_orig.mp4', 'Кавер-группа')">
        <div class="video-wrapper">
          <img src="d/anime_all.png" alt="Кавер-группа">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-info">
          <div class="video-title">Кавер-группа</div>
          <div class="video-desc">На корпоративе</div>
        </div>
      </div>

      <div class="video-card" onclick="playVideo('f/folk_cut_mute.mp4', 'Фолк')">
        <div class="video-wrapper">
          <img src="d/bayan_logo.png" alt="Фолк">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-info">
          <div class="video-title">Фолк</div>
          <div class="video-desc">С баяном</div>
        </div>
      </div>

      <div class="video-card" onclick="playVideo('f/backstage_h265_v3.mp4', 'Бэкстейдж')">
        <div class="video-wrapper">
          <img src="d/anime_all.png" alt="Бэкстейдж">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-info">
          <div class="video-title">Закулисье</div>
          <div class="video-desc">Как мы выступаем</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav-bar">
    <a href="index.htm" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="video.html" class="nav-item active">
      <span class="nav-icon">🎬</span>
      <span>Видео</span>
    </a>
    <a href="fotogalereya.html" class="nav-item">
      <span class="nav-icon">📷</span>
      <span>Фото</span>
    </a>
    <a href="repertuar.html" class="nav-item">
      <span class="nav-icon">🎵</span>
      <span>Репертуар</span>
    </a>
    <a href="kontakty.html" class="nav-item">
      <span class="nav-icon">📞</span>
      <span>Контакты</span>
    </a>
  </nav>

  <script>
    function playVideo(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;';
      modal.innerHTML = `
        <video src="${src}" controls autoplay style="max-width:100%;max-height:100%;"></video>
        <div onclick="this.parentElement.remove()" style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);color:white;padding:10px 20px;border-radius:10px;cursor:pointer;">✕ Закрыть</div>
      `;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
